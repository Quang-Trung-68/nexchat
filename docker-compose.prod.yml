# chat-app — production (Postgres + Redis + API + worker + SPA)
# Chạy từ root repo. Cần file .env cùng cấp với GHCR_PREFIX, POSTGRES_*, VITE_* (cho build local).
# Nginx edge nằm ở nextech — join mạng shared-proxy-network.
#
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chatapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-chat_app}
    volumes:
      - chat_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-chatapp} -d ${POSTGRES_DB:-chat_app}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - internal

  chat-server:
    image: ${GHCR_PREFIX:?Set GHCR_PREFIX in .env e.g. ghcr.io/yourgithubuser}/chat-app-server:latest
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    expose:
      - "5000"
    env_file:
      - ./apps/server/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-chatapp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-chat_app}?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: "5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:5000/api/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
    networks:
      - internal
      - proxy

  chat-worker:
    image: ${GHCR_PREFIX:?Set GHCR_PREFIX in .env e.g. ghcr.io/yourgithubuser}/chat-app-server:latest
    restart: unless-stopped
    working_dir: /app/apps/server
    command: ["node", "dist/worker.js"]
    env_file:
      - ./apps/server/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-chatapp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-chat_app}?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - internal

  chat-client:
    image: ${GHCR_PREFIX:?Set GHCR_PREFIX in .env e.g. ghcr.io/yourgithubuser}/chat-app-client:latest
    build:
      context: .
      dockerfile: apps/client/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL}
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      chat-server:
        condition: service_healthy
    networks:
      - internal
      - proxy

volumes:
  chat_postgres_data:

networks:
  internal:
    name: chat-app-network
  proxy:
    name: shared-proxy-network
    external: true
