# chat-app — lint → build & push ghcr.io → SSH deploy
name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install & ESLint (deploy-related paths)
        run: |
          npm install
          npx eslint \
            apps/client/src/lib/apiOrigin.ts \
            apps/client/src/vite-env.d.ts \
            apps/client/src/services/api.ts \
            apps/client/src/features/sockets/useSocket.ts \
            apps/client/src/features/auth/components/LoginForm.tsx \
            apps/server/src/config/env.ts \
            apps/server/src/features/auth/auth.controller.ts \
            --max-warnings 0

  build-and-push:
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: server
            file: apps/server/Dockerfile
            image: chat-app-server
            needs_vite: false
          - id: client
            file: apps/client/Dockerfile
            image: chat-app-client
            needs_vite: true

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase GitHub owner (ghcr.io requires lowercase)
        id: owner
        run: echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (server)
        if: matrix.needs_vite != true
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.owner_lc }}/${{ matrix.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push (client)
        if: matrix.needs_vite == true
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.owner_lc }}/${{ matrix.image }}:latest
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_SOCKET_URL=${{ secrets.VITE_SOCKET_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.5
        env:
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_READ_TOKEN,GHCR_USER
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_DEPLOY_PATH }}"
            git pull origin main
            echo "$GHCR_READ_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --no-build
            set +u
            [ -f .env ] && . ./.env
            set -u
            PG_USER="${POSTGRES_USER:-chatapp}"
            until docker compose -f docker-compose.prod.yml exec -T postgres pg_isready -U "$PG_USER" >/dev/null 2>&1; do
              sleep 2
            done
            docker compose -f docker-compose.prod.yml exec -T chat-server npx prisma generate
            docker compose -f docker-compose.prod.yml exec -T chat-server npx prisma migrate deploy
